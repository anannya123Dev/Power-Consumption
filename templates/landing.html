<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerSense — Smart Energy Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080b14;
  --emerald:#10b981;--emerald-d:#059669;--emerald-glow:rgba(16,185,129,0.3);
  --yellow:#f59e0b;--yellow-glow:rgba(245,158,11,0.3);
  --orange:#f97316;
  --purple:#8b5cf6;--purple-glow:rgba(139,92,246,0.3);
  --text:#f1f5f9;--muted:#64748b;
  --font:'Outfit',sans-serif;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  position:relative;}

/* ── Canvas background ── */
canvas#bg{position:fixed;inset:0;z-index:0;}

/* ── Gradient orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none;animation:orbFloat 8s ease-in-out infinite;}
.orb1{width:500px;height:500px;background:rgba(16,185,129,0.08);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:rgba(139,92,246,0.08);bottom:-80px;right:-80px;animation-delay:3s;}
.orb3{width:300px;height:300px;background:rgba(245,158,11,0.06);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.5s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-20px);}}
.orb2{animation-name:orbFloat2;}
@keyframes orbFloat2{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,30px);}}

/* ── Center content ── */
.center{position:relative;z-index:10;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:0;}

/* ── Lightning bolt ── */
.bolt-wrap{position:relative;width:120px;height:120px;margin-bottom:32px;}
.bolt-ring{position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(16,185,129,0.3);
  animation:ringPulse 2s ease-in-out infinite;}
.bolt-ring2{position:absolute;inset:-12px;border-radius:50%;
  border:1px solid rgba(16,185,129,0.15);
  animation:ringPulse 2s ease-in-out infinite 0.4s;}
.bolt-ring3{position:absolute;inset:-24px;border-radius:50%;
  border:1px solid rgba(16,185,129,0.08);
  animation:ringPulse 2s ease-in-out infinite 0.8s;}
@keyframes ringPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.05);}}

.bolt-circle{width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(139,92,246,0.15));
  border:1px solid rgba(16,185,129,0.4);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
  box-shadow:0 0 40px rgba(16,185,129,0.2),0 0 80px rgba(16,185,129,0.1),inset 0 0 30px rgba(16,185,129,0.05);
  animation:boltGlow 2s ease-in-out infinite;}
@keyframes boltGlow{
  0%,100%{box-shadow:0 0 40px rgba(16,185,129,0.2),0 0 80px rgba(16,185,129,0.1);}
  50%{box-shadow:0 0 60px rgba(16,185,129,0.4),0 0 120px rgba(16,185,129,0.2),0 0 20px rgba(245,158,11,0.1);}
}
.bolt-svg{width:52px;height:52px;animation:boltFlash 2s ease-in-out infinite;}
@keyframes boltFlash{0%,100%{filter:drop-shadow(0 0 8px #10b981);}50%{filter:drop-shadow(0 0 20px #10b981) drop-shadow(0 0 40px #f59e0b);}}

/* ── Title ── */
.title{font-size:clamp(3em,8vw,5.5em);font-weight:900;line-height:1;
  letter-spacing:-0.03em;margin-bottom:8px;
  background:linear-gradient(135deg,#f1f5f9 0%,#10b981 40%,#f59e0b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleIn 0.8s ease forwards;}
@keyframes titleIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.tagline{font-size:clamp(0.9em,2vw,1.15em);font-weight:400;color:var(--muted);
  letter-spacing:0.02em;margin-bottom:48px;max-width:420px;line-height:1.6;
  animation:titleIn 0.8s ease 0.2s both;}

/* ── CTA Button ── */
.cta{position:relative;padding:16px 48px;font-family:var(--font);
  font-size:1.05em;font-weight:700;letter-spacing:0.04em;
  background:linear-gradient(135deg,var(--emerald),var(--emerald-d));
  color:white;border:none;border-radius:50px;cursor:pointer;
  box-shadow:0 4px 24px var(--emerald-glow),0 0 0 0 var(--emerald-glow);
  transition:all 0.3s;overflow:hidden;
  animation:titleIn 0.8s ease 0.4s both;}
.cta::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
  opacity:0;transition:opacity 0.3s;}
.cta:hover{transform:translateY(-2px);
  box-shadow:0 8px 40px var(--emerald-glow),0 0 0 4px rgba(16,185,129,0.15);}
.cta:hover::before{opacity:1;}
.cta:active{transform:translateY(0);}

/* Ripple */
.ripple{position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.3);
  transform:scale(0);animation:ripple 0.6s linear;}
@keyframes ripple{to{transform:scale(4);opacity:0;}}

/* ── Stats row ── */
.stats{display:flex;gap:32px;margin-top:56px;
  animation:titleIn 0.8s ease 0.6s both;}
.stat{text-align:center;}
.stat-val{font-size:1.6em;font-weight:800;
  background:linear-gradient(135deg,var(--emerald),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-size:0.75em;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
.stat-div{width:1px;background:rgba(255,255,255,0.08);align-self:stretch;}

/* ── Corner badges ── */
.badge{position:fixed;font-size:0.75em;font-weight:600;
  padding:6px 14px;border-radius:20px;z-index:10;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  color:var(--muted);backdrop-filter:blur(10px);}
.badge-tl{top:24px;left:24px;}
.badge-tr{top:24px;right:24px;color:var(--emerald);border-color:rgba(16,185,129,0.2);}

/* ── Transition overlay ── */
#overlay{position:fixed;inset:0;z-index:1000;
  background:var(--bg);opacity:0;pointer-events:none;
  transition:opacity 0.5s ease;}
#overlay.go{opacity:1;pointer-events:all;}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<span class="badge badge-tl">⚡ ML Powered</span>
<span class="badge badge-tr">● LIVE</span>

<div class="center">
  <!-- Bolt icon -->
  <div class="bolt-wrap">
    <div class="bolt-ring"></div>
    <div class="bolt-ring2"></div>
    <div class="bolt-ring3"></div>
    <div class="bolt-circle">
      <svg class="bolt-svg" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L4.09 12.96A1 1 0 005 14.5h6.5L10 22l9.5-11.5A1 1 0 0018.5 9H12L13 2z"
          fill="url(#boltGrad)" stroke="none"/>
        <defs>
          <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981"/>
            <stop offset="100%" stop-color="#f59e0b"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <h1 class="title">PowerSense</h1>
  <p class="tagline">Real-time electricity monitoring powered by machine learning. Know your usage. Cut your costs.</p>

  <button class="cta" onclick="launch(event)">
    Get Started &nbsp;→
  </button>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="s1">0</div>
      <div class="stat-label">Watts tracked</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <div class="stat-val" id="s2">4</div>
      <div class="stat-label">Devices</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <div class="stat-val" id="s3">0%</div>
      <div class="stat-label">ML accuracy</div>
    </div>
  </div>
</div>

<div id="overlay"></div>

<script>
// ── Particle canvas ──────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){this.reset();}
  reset(){
    this.x  = Math.random()*W;
    this.y  = Math.random()*H;
    this.vx = (Math.random()-0.5)*0.4;
    this.vy = (Math.random()-0.5)*0.4;
    this.r  = Math.random()*1.5+0.5;
    this.alpha = Math.random()*0.4+0.1;
    this.color = ['#10b981','#f59e0b','#8b5cf6','#f97316'][Math.floor(Math.random()*4)];
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.color;
    ctx.globalAlpha=this.alpha;
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

for(let i=0;i<120;i++) particles.push(new Particle());

// Draw connecting lines
function drawLines(){
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x;
      const dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle='rgba(16,185,129,'+(0.08*(1-d/120))+')';
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,W,H);
  drawLines();
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animate);
}
animate();

// ── Ripple effect ────────────────────────────────────────────
document.querySelector('.cta').addEventListener('click',function(e){
  const r=document.createElement('span');
  r.className='ripple';
  const rect=this.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
  this.appendChild(r);
  setTimeout(()=>r.remove(),600);
});

// ── Animated counters ────────────────────────────────────────
function countUp(el, target, suffix='', duration=1500){
  let start=0, step=target/60;
  const interval=setInterval(()=>{
    start=Math.min(start+step,target);
    el.textContent=Math.floor(start)+suffix;
    if(start>=target) clearInterval(interval);
  },duration/60);
}
// Fetch live data from the running app
fetch('/api/data')
  .then(r => r.json())
  .then(d => {
    const activeCount = d.devices
      ? d.devices.filter(dev => dev.active !== false).length
      : 0;
    const totalPower = d.total_predicted || 0;

    setTimeout(()=>{
      countUp(document.getElementById('s1'), Math.round(totalPower), 'W');
      countUp(document.getElementById('s3'), 97, '%');
    }, 300);

    // Set device count directly — no animation needed
    document.getElementById('s2').textContent = activeCount;
  })
  .catch(()=>{
    // Fallback if API not ready
    setTimeout(()=>{
      countUp(document.getElementById('s1'), 1804, 'W');
      countUp(document.getElementById('s3'), 97, '%');
    }, 600);
  });
// ── Launch transition ────────────────────────────────────────
function launch(e){
  const overlay=document.getElementById('overlay');
  overlay.classList.add('go');
  setTimeout(()=>{ window.location.href='/dashboard'; },500);
}
</script>
</body>
</html>
